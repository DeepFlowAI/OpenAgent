<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenAgent SDK 测试页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; }
    .navbar { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 24px; height: 52px; display: flex; align-items: center; }
    .navbar span { color: #737373; font-size: 14px; }
    .container { max-width: 960px; margin: 0 auto; padding: 48px 24px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #737373; font-size: 15px; margin-bottom: 40px; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .card p { color: #525252; font-size: 14px; line-height: 1.6; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; border: 1px solid #e5e5e5; background: #fff; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.15s; }
    .btn:hover { background: #f5f5f5; border-color: #d4d4d4; }
    .btn-dark { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .btn-dark:hover { background: #333; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 40px; }
    .status { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; background: #f0fdf4; color: #16a34a; font-size: 13px; font-weight: 500; }
    .status.off { background: #fef2f2; color: #dc2626; }
    .log { background: #18181b; color: #a1a1aa; border-radius: 10px; padding: 16px 20px; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 13px; line-height: 1.8; max-height: 240px; overflow-y: auto; }
    .log .info { color: #60a5fa; }
    .log .success { color: #4ade80; }
    .log .warn { color: #fbbf24; }
    .footer { text-align: center; padding: 40px 0; color: #a3a3a3; font-size: 12px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <span>商户网站 · SDK 测试页</span>
  </nav>

  <div class="container">
    <h1>OpenAgent SDK 测试</h1>
    <p class="subtitle">在此页面中嵌入 SDK，验证悬浮按钮、会话小窗、配置加载等功能。</p>

    <div class="grid">
      <div class="card">
        <h2>🔌 SDK 状态</h2>
        <p>SDK 版本: <strong id="sdkVersion">-</strong></p>
        <p style="margin-top:8px">小窗状态: <span id="windowStatus" class="status off">关闭</span></p>
      </div>
      <div class="card">
        <h2>⚙️ 配置信息</h2>
        <p>渠道 ID: <strong>6</strong></p>
        <p style="margin-top:8px">脚本地址: <code style="font-size:12px;color:#737373">localhost:3000/sdk/openagent-sdk.js</code></p>
      </div>
    </div>

    <h2 style="font-size:16px;font-weight:600;margin-bottom:16px">控制面板</h2>
    <div class="controls">
      <button class="btn btn-dark" onclick="sdkOpen()">打开会话</button>
      <button class="btn" onclick="sdkClose()">关闭会话</button>
      <button class="btn" onclick="sdkToggle()">切换显隐</button>
      <button class="btn" onclick="sdkDestroy()" style="color:#dc2626;border-color:#fecaca">销毁实例</button>
      <button class="btn" onclick="sdkReinit()">重新初始化</button>
    </div>

    <h2 style="font-size:16px;font-weight:600;margin-bottom:16px">事件日志</h2>
    <div class="log" id="log"></div>
  </div>

  <footer class="footer">OpenAgent SDK Test Page · v1.0.0</footer>

  <script src="http://localhost:3000/sdk/openagent-sdk.js"></script>
  <script>
    var widget = null;
    var logEl = document.getElementById('log');
    var statusEl = document.getElementById('windowStatus');
    var versionEl = document.getElementById('sdkVersion');

    function log(msg, type) {
      var cls = type || '';
      var time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      logEl.innerHTML += '<div><span style="color:#525252">[' + time + ']</span> <span class="' + cls + '">' + msg + '</span></div>';
      logEl.scrollTop = logEl.scrollHeight;
    }

    function updateStatus() {
      if (!widget) {
        statusEl.textContent = '未初始化';
        statusEl.className = 'status off';
        return;
      }
      var open = widget.isOpen();
      statusEl.textContent = open ? '已打开' : '关闭';
      statusEl.className = open ? 'status' : 'status off';
    }

    function initSDK() {
      log('初始化 SDK...', 'info');
      versionEl.textContent = OpenAgentSDK.version;

      widget = OpenAgentSDK.init({
        channelId: '6',
        onReady: function () {
          log('✓ SDK 就绪，渠道配置已加载', 'success');
        },
        onOpen: function () {
          log('小窗已打开', 'info');
          updateStatus();
        },
        onClose: function () {
          log('小窗已关闭', 'warn');
          updateStatus();
        },
        onError: function (err) {
          log('✗ 错误: ' + (err.message || JSON.stringify(err)), 'warn');
        },
      });

      log('✓ 实例已创建 (version: ' + widget.version + ')', 'success');
      updateStatus();
    }

    function sdkOpen() {
      if (!widget) { log('请先初始化', 'warn'); return; }
      widget.open();
    }

    function sdkClose() {
      if (!widget) { log('请先初始化', 'warn'); return; }
      widget.close();
    }

    function sdkToggle() {
      if (!widget) { log('请先初始化', 'warn'); return; }
      widget.toggle();
    }

    function sdkDestroy() {
      if (!widget) { log('请先初始化', 'warn'); return; }
      widget.destroy();
      widget = null;
      log('实例已销毁', 'warn');
      updateStatus();
    }

    function sdkReinit() {
      if (widget) {
        widget.destroy();
        widget = null;
      }
      initSDK();
    }

    initSDK();
  </script>
</body>
</html>
