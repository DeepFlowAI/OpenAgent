# openagent — single-host docker compose.
#
# All configuration (including which dependencies to embed) lives in .env.
# Copy .env.example → .env, edit, then always run:
#
#   docker compose up -d
#
# To use external PostgreSQL or Redis, edit COMPOSE_PROFILES in .env to
# exclude "with-postgres" / "with-redis" and fill in DATABASE_URL / REDIS_URL.
# See .env.example for the full reference.

services:
  # ── Optional embedded PostgreSQL (with pgvector) ───────────────────────
  postgres:
    profiles: [with-postgres]
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openagent}
      POSTGRES_DB: ${POSTGRES_DB:-openagent}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openagent}"]
      interval: 5s
      retries: 10

  # ── Optional embedded Redis ────────────────────────────────────────────
  redis:
    profiles: [with-redis]
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  # ── Backend API ────────────────────────────────────────────────────────
  api:
    image: deepflowagent/openagent-api:${OPENAGENT_VERSION:-latest}
    restart: unless-stopped
    # `required: false` lets api start even when postgres/redis are filtered
    # out by inactive profiles (i.e. external DB / external Redis modes).
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_started
        required: false
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://openagent:openagent@postgres:5432/openagent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
      # Required. Generate with:
      #   python -c "import secrets; print(secrets.token_hex(32))"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set — run "python -c \"import secrets; print(secrets.token_hex(32))\"" and put it in .env}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      # First-run only — change the admin password after first login.
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-default}
      DEFAULT_TENANT_NAME: ${DEFAULT_TENANT_NAME:-Default Workspace}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-Admin123456}
      # ── LLM provider keys (set whichever you need) ───────────────────
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE_URL: ${DEEPSEEK_API_BASE_URL:-https://api.deepseek.com}
      ALIYUN_BAILIAN_API_KEY: ${ALIYUN_BAILIAN_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      # ── Embedding / Reranker (knowledge base) ─────────────────────────
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-Pro/BAAI/bge-m3}
      RERANKER_MODEL: ${RERANKER_MODEL:-Pro/BAAI/bge-reranker-v2-m3}
      # Optional SMTP
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Optional object storage (file uploads). Leave empty to disable.
      OSS_ACCESS_KEY: ${OSS_ACCESS_KEY:-}
      OSS_SECRET_KEY: ${OSS_SECRET_KEY:-}
      OSS_ADDR: ${OSS_ADDR:-}
      OSS_URL: ${OSS_URL:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
    ports:
      - "${API_PORT:-5001}:8000"

  # ── Frontend ───────────────────────────────────────────────────────────
  web:
    image: deepflowagent/openagent-web:${OPENAGENT_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # These are read by the BROWSER, so use a hostname the browser can
      # reach (typically your public domain or http://localhost:5001 for
      # single-host dev).
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:5001/api/}
      # Server-side: in-cluster API URL the Next.js server runtime uses for
      # SSR routes. Defaults to the in-compose api service via DNS.
      BACKEND_URL: ${BACKEND_URL:-http://api:8000}
      PUBLIC_DOCS_HOST: ${PUBLIC_DOCS_HOST:-}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  pgdata:
  redisdata:
